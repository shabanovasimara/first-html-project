<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task</title>
</head>
<body>
    <form action="">
    <h2>Mətn inputları:</h2>
    <input type="text" name="name" id="">
    <input type="email" name="email" id="">
    <input type="password" name="password" id="">
    <h2>Digər inputlar:</h2>
    <input type="number" name="age" id="">
    <input type="date" name="date" id="">
    <input type="tel" name="tel" id="">
    <h2>Seçimlər:</h2>
    <h4>Gender</h4>
    <input type="radio" name="gender" value="Kişi"> Kişi
    <input type="radio" name="gender" value="Qadın"> Qadın
    <h4>Hobbi</h4>
    <input type="checkbox" name="hobbies[]" value="idman" id="idman"> Idman
    <input type="checkbox" name="hobbies[]" value="musiqi" id="Musiqi"> Musiqi
    <input type="checkbox" name="hobbies[]" value="səyahət" id="Səyahət"> Səyahət
    <h2>Select:</h2>
    <select name="country" id="">
        <option value="" disabled selected>Ölkə seçin</option>
        <option value="az">Azərbaycan</option>
        <option value="tr">Türkiyə</option>
        <option value="de">Almaniya</option>
    </select>
    <h2>Mesaj sahəsi:</h2>
    <textarea name="message" id="" cols="30" rows="10"></textarea>
    <h2>Düymələr:</h2>
    <button type="submit">Göndər</button>
    <button type="reset">Təmizlə</button>
    </form>
</body>
</html>
